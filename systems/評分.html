<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球城市漫遊者系統 - 探索者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0066CC 0%, #003580 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .search-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input[type="text"],
        select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #0066CC;
            box-shadow: 0 0 10px rgba(0, 102, 204, 0.3);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #0066CC 0%, #003580 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-tag {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-tag:hover,
        .filter-tag.active {
            background: #0066CC;
            color: white;
            border-color: #0066CC;
        }

        .landmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .landmark-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideUp 0.5s ease-out;
        }

        .landmark-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .landmark-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #0066CC 0%, #003580 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .landmark-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.15);
        }

        .landmark-content {
            padding: 20px;
        }

        .landmark-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .landmark-city {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .landmark-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stars {
            color: #ffd700;
            font-size: 1.2em;
        }

        .rating-number {
            color: #666;
            font-weight: bold;
        }

        .landmark-description {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 15px;
            height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .landmark-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            padding: 5px 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-size: 0.8em;
            color: #666;
        }

        .view-details {
            display: inline-block;
            color: #0066CC;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .view-details:hover {
            color: #003580;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            animation: slideDown 0.3s ease;
        }

        .modal-close {
            float: right;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
            clear: both;
        }

        .modal-subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .modal-emoji {
            font-size: 2em;
            margin-right: 10px;
        }

        .review-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }

        .review-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .review {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .review-author {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .review-rating {
            color: #ffd700;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .review-text {
            color: #666;
            line-height: 1.6;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            color: #999;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            color: #0066CC;
            font-weight: bold;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .landmarks-grid {
                grid-template-columns: 1fr;
            }

            .search-container {
                flex-direction: column;
            }

            input[type="text"],
            select {
                min-width: auto;
            }
        }
    </style>
</head>

<body>

            </div>

            <div class="stats">
                <div class="stat-box">

                <div class="stat-box">
                    <div class="stat-number" id="countriesCount">0</div>
                    <div class="stat-label">涵蓋國家</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="avgRating">0</div>
                    <div class="stat-label">平均評分</div>

            </div>
        </div>

        <div class="landmarks-grid" id="landmarksContainer">

        </div>

        <div class="no-results" id="noResults" style="display: none;">

            <p style="margin-top: 10px;">試試看改變搜尋條件或篩選器</p>
        </div>
    </div>

        let currentFilter = '';
        let currentContinentFilter = '';

        // 初始化頁面
        window.addEventListener('load', function () {
            displayLandmarks(landmarks);
            updateStats();
        });

        // 顯示景點
        function displayLandmarks(items) {
            const container = document.getElementById('landmarksContainer');
            const noResults = document.getElementById('noResults');

            if (items.length === 0) {
                container.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            noResults.style.display = 'none';

            container.innerHTML = items.map(landmark => `
                <div class="landmark-card" onclick="showDetail(${landmark.id})">
                    <div class="landmark-image" style="background-image: url('${landmark.image}')"></div>
                    <div class="landmark-content">
                        <div class="landmark-title">${landmark.name}</div>
                        <div class="landmark-city">📍 ${landmark.city}, ${landmark.country}</div>
                        <div class="landmark-rating">
                            <span class="stars">${'⭐'.repeat(Math.floor(landmark.rating))}</span>
                            <span class="rating-number">${landmark.rating} (${landmark.reviews})</span>
                        </div>
                        <div class="landmark-description">${landmark.description}</div>
                        <div class="landmark-tags">
                            <span class="tag">${landmark.type}</span>
                            <span class="tag">${landmark.continent}</span>
                        </div>
                        <a href="javascript:void(0)" class="view-details">查看詳情 →</a>
                    </div>
                </div>
            `).join('');
        }

        // 搜尋景點
        function searchLandmarks() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const continent = document.getElementById('continentFilter').value;

            let results = landmarks.filter(landmark => {
                const matchesSearch = !searchText ||
                    landmark.name.toLowerCase().includes(searchText) ||
                    landmark.city.toLowerCase().includes(searchText) ||
                    landmark.country.toLowerCase().includes(searchText);

                const matchesContinent = !continent || landmark.continent === continent;
                const matchesType = !currentFilter || landmark.type === currentFilter;

                return matchesSearch && matchesContinent && matchesType;
            });

            displayLandmarks(results);
            updateStats(results);
        }

        // 按類型篩選
        function filterByType(type) {
            currentFilter = currentFilter === type ? '' : type;
            updateFilterTags();
            searchLandmarks();
        }

        // 更新篩選標籤樣式
        function updateFilterTags() {
            const tags = document.querySelectorAll('.filter-tag');
            tags.forEach(tag => {
                tag.classList.remove('active');
                if (tag.textContent.includes(currentFilter === 'Natural' ? '自然景觀' :
                    currentFilter === 'Historical' ? '歷史遺蹟' :
                        currentFilter === 'Modern' ? '現代建築' :
                            currentFilter === 'Religious' ? '宗教場所' :
                                currentFilter === 'Museum' ? '博物館' : '')) {
                    tag.classList.add('active');
                }
            });
        }

        // 重置篩選
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('continentFilter').value = '';
            currentFilter = '';
            currentContinentFilter = '';
            updateFilterTags();
            displayLandmarks(landmarks);
            updateStats();
        }

        // 顯示詳細信息
        function showDetail(id) {
            const landmark = landmarks.find(l => l.id === id);
            if (!landmark) return;

            const modalBody = document.getElementById('modalBody');
            const reviewsHTML = landmark.reviews_list.map(review => `
                <div class="review">
                    <div class="review-author">${review.author}</div>
                    <div class="review-rating">${'⭐'.repeat(review.rating)}</div>
                    <div class="review-text">${review.text}</div>
                </div>
            `).join('');

            const tipsHTML = landmark.visitTips.map(tip => `<li>${tip}</li>`).join('');

            modalBody.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 4em; margin-bottom: 10px;">${landmark.emoji}</div>
                    <h2 class="modal-title">${landmark.name}</h2>
                    <p class="modal-subtitle">📍 ${landmark.city}, ${landmark.country}</p>
                </div>

                <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <p><strong>評分：</strong> ${'⭐'.repeat(Math.floor(landmark.rating))} ${landmark.rating} 分 (${landmark.reviews} 位評論者)</p>
                    <p><strong>類型：</strong> ${landmark.type}</p>
                    <p><strong>所在洲：</strong> ${landmark.continent}</p>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="color: #333; margin-bottom: 10px; font-size: 1.2em;">📝 景點介紹</h3>
                    <p style="color: #666; line-height: 1.8;">${landmark.description}</p>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="color: #333; margin-bottom: 10px; font-size: 1.2em;">✨ 遊覽提示</h3>
                    <ul style="color: #666; line-height: 1.8; padding-left: 20px;">
                        ${tipsHTML}
                    </ul>
                </div>

                <div class="review-section">
                    <h3 class="review-title">💬 遊客評價</h3>
                    ${reviewsHTML}
                </div>
            `;

            document.getElementById('detailModal').classList.add('active');
        }

        // 關閉模態窗口
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 點擊模態外部關閉
        document.getElementById('detailModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 更新統計信息
        function updateStats(items = landmarks) {
            document.getElementById('totalLandmarks').textContent = items.length;

            const countries = new Set(items.map(l => l.country)).size;
            document.getElementById('countriesCount').textContent = countries;

            const avgRating = (items.reduce((sum, l) => sum + l.rating, 0) / items.length).toFixed(1);
            document.getElementById('avgRating').textContent = avgRating;
        }

        // 回車搜尋
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('searchInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    searchLandmarks();
                }
            });
        });
    </script>

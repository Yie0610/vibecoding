<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📁 檔案詳細資料清單</title>

    <!-- ========================================== -->
    <!-- 🛠️ 核心設定區塊 -->
    <!-- ========================================== -->
    <script>
        const CONFIG = {
            owner: 'yie0610',
            repo: 'vibe',
            
            // 👇 您的密碼雜湊值。現在已不需要設定 lockedRootFolder，它會自動偵測！
            passwordHash: '493df9116ac66615f686d24508b0d3894902a5c3b4f3ea98099809c691eee357' 
        };
    </script>
    <!-- ========================================== -->

    <style>
        :root {
            --bg-color: #f3f4f6; --card-bg: white; --text-color: #333; --text-muted: #6b7280;
            --border-color: #e5e7eb; --th-bg: #f9fafb; --hover-bg: #f3f4f6; --link-color: #2563eb;
            --accent-color: #3b82f6; --error-bg: #fee2e2; --error-color: #ef4444;
        }
        body.dark-mode {
            --bg-color: #111827; --card-bg: #1f2937; --text-color: #f9fafb; --text-muted: #9ca3af;
            --border-color: #374151; --th-bg: #111827; --hover-bg: #374151; --link-color: #60a5fa;
            --accent-color: #60a5fa; --error-bg: #7f1d1d; --error-color: #fca5a5;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 950px; margin: 40px auto; padding: 20px; transition: 0.3s; }
        .container { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; padding: 25px; transition: 0.3s; display: none; }
        
        /* --- 🔐 登入介面樣式 --- */
        .login-container { max-width: 400px; margin: 100px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .login-container h2 { margin-top: 0; color: var(--text-color); }
        .pwd-input { width: 80%; padding: 12px; margin: 20px 0; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; background: var(--bg-color); color: var(--text-color); outline: none; }
        .pwd-input:focus { border-color: var(--accent-color); }
        .btn-submit { background-color: var(--accent-color); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
        #login-error { color: var(--error-color); margin-top: 10px; font-size: 14px; display: none; }

        /* --- 標題與工具列區塊 --- */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 26px; }
        .theme-toggle { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .theme-toggle:hover { background-color: var(--hover-bg); }
        .breadcrumbs { padding: 5px 0 20px 0; font-size: 15px; color: var(--text-muted); }
        .breadcrumb-link { color: var(--link-color); text-decoration: none; font-weight: 500; }
        .breadcrumb-link:hover { text-decoration: underline; }
        .separator { margin: 0 8px; color: var(--text-muted); }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        .search-input { flex-grow: 1; max-width: 300px; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-color); color: var(--text-color); outline: none; font-size: 14px; }
        .switch-container { display: flex; align-items: center; font-size: 14px; color: var(--text-muted); }
        .switch { position: relative; display: inline-block; width: 42px; height: 24px; margin-right: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* --- 表格 --- */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--th-bg); font-weight: 600; color: var(--text-color); cursor: pointer; user-select: none; transition: 0.2s; }
        th:hover { background-color: var(--border-color); }
        .sort-icon { font-size: 0.8em; margin-left: 5px; color: var(--text-muted); }
        tr:hover { background-color: var(--hover-bg); }
        .file-name-cell { display: flex; justify-content: space-between; align-items: center; }
        .file-link { text-decoration: none; color: var(--link-color); font-weight: 500; display: flex; align-items: center; flex-grow: 1; }
        .file-link:hover { text-decoration: underline; }
        .icon { margin-right: 10px; font-size: 1.3em; }
        .time-cell { font-size: 0.9em; color: var(--text-muted); }
        .time-active { color: var(--text-color); }
        .download-btn { text-decoration: none; opacity: 0.4; transition: 0.2s; font-size: 1.1em; padding: 5px; }
        .download-btn:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- 🔐 密碼登入區塊 -->
    <div class="login-container" id="login-section">
        <h2>🔒 私人檔案庫</h2>
        <p style="color: var(--text-muted); font-size: 14px;">請輸入存取密碼以查看內容</p>
        <input type="password" id="pwdInput" class="pwd-input" placeholder="輸入密碼..." onkeypress="if(event.key === 'Enter') verifyPassword()">
        <br>
        <button class="btn-submit" onclick="verifyPassword()">解鎖進入</button>
        <div id="login-error">密碼錯誤，請重試！</div>
    </div>

    <!-- 📁 主要檔案清單區塊 -->
    <div class="container" id="main-app">
        <div class="header-section">
            <h1>📁 檔案清單</h1>
            <button id="themeToggleBtn" class="theme-toggle">🌙 暗色模式</button>
        </div>
        <div id="breadcrumbs" class="breadcrumbs"></div>
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋檔案或副檔名...">
            <div class="switch-container">
                <label class="switch"><input type="checkbox" id="timeToggle"><span class="slider"></span></label>
                <span>顯示最後修改時間</span>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 45%;" onclick="sortTable('name')">檔案名稱 <span id="sort-icon-name" class="sort-icon"></span></th>
                    <th style="width: 15%;" onclick="sortTable('type')">類型 <span id="sort-icon-type" class="sort-icon"></span></th>
                    <th style="width: 15%;" onclick="sortTable('size')">大小 <span id="sort-icon-size" class="sort-icon"></span></th>
                    <th style="width: 25%;" onclick="sortTable('time')">最後修改時間 <span id="sort-icon-time" class="sort-icon"></span></th>
                </tr>
            </thead>
            <tbody id="file-list">
                <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">載入中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // ==========================================
        // 🌍 自動偵測環境與路徑配置
        // ==========================================
        
        // 1. 解析實際存在的資料夾位置 (作為 API 呼叫的起點)
        let basePath = window.location.pathname.replace(/index\.html$/, '').replace(/\/$/, '');
        const repoPrefix = `/${CONFIG.repo}`;
        if (basePath.startsWith(repoPrefix)) basePath = basePath.substring(repoPrefix.length);
        basePath = basePath.replace(/^\//, ''); // 獲得像 'b' 這樣的純路徑
        
        // 2. 解析瀏覽器實際的基礎 URL (作為檔案下載與連結的前綴)
        let baseUrl = window.location.pathname.replace(/index\.html$/, '');
        if (!baseUrl.endsWith('/')) baseUrl += '/';

        // 全局變數
        let allFiles = []; 
        let currentSort = { column: 'name', isAsc: true };

        // ==========================================
        // 🔐 登入與驗證邏輯
        // ==========================================
        const SESSION_KEY = `auth_${CONFIG.repo}_${basePath}`;
        
        if (sessionStorage.getItem(SESSION_KEY) === 'true') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initApp(); 
        }

        async function verifyPassword() {
            const pwd = document.getElementById('pwdInput').value;
            const errorMsg = document.getElementById('login-error');
            
            // 🌟 產生 Hash 的後門
            if (pwd.startsWith('##')) {
                const newPwd = pwd.substring(2);
                if (!newPwd) { alert("請輸入想要的新密碼，例如：##5678"); return; }
                const encoder = new TextEncoder();
                const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(newPwd));
                const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                try {
                    await navigator.clipboard.writeText(hashHex);
                    alert(`✅ 產生成功！\n\n加密代碼已經自動複製！\n請貼到最上方的 CONFIG 區塊替換。`);
                } catch(err) {
                    prompt(`✅ 產生成功！請手動複製代碼：`, hashHex);
                }
                document.getElementById('pwdInput').value = '';
                return;
            }

            const encoder = new TextEncoder();
            const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(pwd));
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === CONFIG.passwordHash) {
                sessionStorage.setItem(SESSION_KEY, 'true');
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initApp();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // ==========================================
        // 🚀 主程式邏輯 (SPA 架構)
        // ==========================================
        function initApp() {
            // 主題切換邏輯
            const themeBtn = document.getElementById('themeToggleBtn');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                themeBtn.innerHTML = '☀️ 亮色模式';
            }
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeBtn.innerHTML = isDark ? '☀️ 亮色模式' : '🌙 暗色模式';
            });

            // 監聽網址 Hash 變化 (不需重新整理網頁即可切換資料夾)
            window.addEventListener('hashchange', loadCurrentFolder);
            
            // 初始載入
            loadCurrentFolder();
        }

        function loadCurrentFolder() {
            // 取得虛擬路徑 (例如 #systems/hw1)
            const subPath = window.location.hash.replace(/^#\/?/, '');
            
            // 重置搜尋與時間開關狀態
            document.getElementById('searchInput').value = '';
            document.getElementById('timeToggle').checked = false;

            // 繪製麵包屑
            renderBreadcrumbs(subPath);

            // 呼叫 API
            let apiPath = basePath;
            if (subPath) apiPath += (apiPath ? '/' : '') + subPath;
            const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${apiPath}`;

            const tbody = document.getElementById('file-list');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">資料載入中...</td></tr>';

            fetch(apiUrl)
                .then(res => {
                    if (!res.ok) throw new Error(res.status === 403 ? 'API 呼叫次數達上限' : (res.status === 404 ? '找不到資料夾' : `錯誤碼: ${res.status}`));
                    return res.json();
                })
                .then(data => {
                    if (!Array.isArray(data)) throw new Error('回傳格式錯誤');
                    allFiles = data.filter(item => item.name.toLowerCase() !== 'index.html').map(item => {
                        const isDir = item.type === 'dir';
                        return {
                            ...item,
                            ext: isDir ? '0_dir' : (item.name.includes('.') ? item.name.split('.').pop().toLowerCase() : 'z_file'), 
                            sizeValue: isDir ? -1 : item.size, 
                            timeValue: 0,     
                            timeDisplay: '--',
                            uid: item.path.replace(/[^a-zA-Z0-9]/g, '_')
                        };
                    });
                    
                    // 強制觸發一次排序繪製表格
                    sortTable(currentSort.column, true); 
                })
                .catch(error => {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--error-color); background-color: var(--error-bg); padding: 20px;"><strong>讀取失敗 ❌</strong><br><br>錯誤原因：${error.message}</td></tr>`;
                });
        }

        function renderBreadcrumbs(subPath) {
            let html = `<a href="#/" class="breadcrumb-link">🏠 首頁 (根目錄)</a>`;
            if (subPath) {
                let parts = subPath.split('/');
                let accum = '';
                parts.forEach((p, index) => {
                    accum += (accum ? '/' : '') + p;
                    if (index === parts.length - 1) {
                        html += `<span class="separator">/</span> <span style="color: var(--text-color); font-weight: bold;">${p}</span>`;
                    } else {
                        html += `<span class="separator">/</span> <a href="#${accum}" class="breadcrumb-link">${p}</a>`;
                    }
                });
            }
            document.getElementById('breadcrumbs').innerHTML = html;
        }

        window.sortTable = function(column, keepDirection = false) {
            if (!keepDirection) {
                if (currentSort.column === column) {
                    currentSort.isAsc = !currentSort.isAsc;
                } else {
                    currentSort.column = column;
                    currentSort.isAsc = true;
                }
            }

            ['name', 'type', 'size', 'time'].forEach(col => {
                const iconEl = document.getElementById(`sort-icon-${col}`);
                if (col === currentSort.column) {
                    iconEl.textContent = currentSort.isAsc ? '▲' : '▼';
                    iconEl.style.color = 'var(--accent-color)'; 
                } else {
                    iconEl.textContent = '';
                }
            });

            allFiles.sort((a, b) => {
                let valA, valB;
                if (column === 'name') { valA = a.name.toLowerCase(); valB = b.name.toLowerCase(); }
                else if (column === 'type') { valA = a.ext; valB = b.ext; }
                else if (column === 'size') { valA = a.sizeValue; valB = b.sizeValue; }
                else if (column === 'time') { valA = a.timeValue; valB = b.timeValue; }
                if (valA < valB) return currentSort.isAsc ? -1 : 1;
                if (valA > valB) return currentSort.isAsc ? 1 : -1;
                return 0;
            });
            renderFileList(); 
        };

        function getFileIcon(filename, isDir) {
            if (isDir) return '🗂️';
            const ext = filename.split('.').pop().toLowerCase();
            const iconMap = {
                'html':'💻', 'css':'💻', 'js':'💻', 'py':'💻', 'cpp':'💻', 'pdf':'📕',
                'stl':'🧊', 'gcode':'🧊', 'jpg':'🖼️', 'png':'🖼️', 'zip':'📦', 'rar':'📦',
                'md':'📝', 'txt':'📝', 'json':'⚙️', 'mp4':'🎬', 'mp3':'🎵', 'xlsx':'📊', 'docx':'📄'
            };
            return iconMap[ext] || '📄';
        }

        document.getElementById('searchInput').addEventListener('input', renderFileList);

        function renderFileList() {
            const tbody = document.getElementById('file-list');
            tbody.innerHTML = '';
            
            const subPath = window.location.hash.replace(/^#\/?/, '');
            
            // 返回上一層按鈕
            if (subPath) {
                const parentPath = subPath.includes('/') ? subPath.substring(0, subPath.lastIndexOf('/')) : '';
                const backTr = document.createElement('tr');
                backTr.innerHTML = `
                    <td><a href="#${parentPath}" style="color: #059669; text-decoration: none; font-weight: bold;"><span class="icon">↩️</span> 返回上一層</a></td>
                    <td style="color: var(--text-muted);">-</td><td style="color: var(--text-muted);">-</td><td class="time-cell">--</td>
                `;
                tbody.appendChild(backTr);
            }

            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredFiles = allFiles.filter(item => item.name.toLowerCase().includes(query));

            if (filteredFiles.length === 0 && allFiles.length > 0) {
                tbody.innerHTML += `<tr><td colspan="4" style="text-align: center; padding: 30px; color: var(--text-muted);">沒有找到符合「${query}」的檔案 🧐</td></tr>`;
                return;
            } else if (allFiles.length === 0) {
                tbody.innerHTML += `<tr><td colspan="4" style="text-align: center; padding: 30px; color: var(--text-muted);">此資料夾目前沒有檔案。</td></tr>`;
                return;
            }

            filteredFiles.forEach(item => {
                const isDir = item.type === 'dir';
                const sizeStr = isDir ? '-' : (item.size >= 1048576 ? (item.size / 1048576).toFixed(2) + ' MB' : (item.size / 1024).toFixed(2) + ' KB');
                const ext = isDir ? '資料夾' : (item.name.includes('.') ? item.name.split('.').pop().toUpperCase() + ' 檔案' : '檔案');
                const icon = getFileIcon(item.name, isDir);
                
                // 動態決定連結 (資料夾用虛擬路由 #，檔案則導向真實下載路徑)
                let itemUrl = '';
                if (isDir) {
                    itemUrl = `#${subPath ? subPath + '/' : ''}${item.name}`;
                } else {
                    itemUrl = `${baseUrl}${subPath ? subPath + '/' : ''}${item.name}`;
                }

                const linkTarget = isDir ? '' : ' target="_blank" rel="noopener noreferrer"';
                const downloadBtn = isDir ? '' : `<a href="${itemUrl}" download class="download-btn" title="下載 ${item.name}">📥</a>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="file-name-cell">
                            <a href="${itemUrl}" class="file-link"${linkTarget}>
                                <span class="icon">${icon}</span> ${item.name}
                            </a>
                            ${downloadBtn}
                        </div>
                    </td>
                    <td style="color: var(--text-muted);">${ext}</td>
                    <td style="color: var(--text-muted);">${sizeStr}</td>
                    <td class="time-cell ${item.timeValue > 0 ? 'time-active' : ''}" id="time-${item.uid}">${item.timeDisplay}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================
        // 🕒 時間抓取機制
        // ==========================================
        document.getElementById('timeToggle').addEventListener('change', function() {
            if (this.checked) fetchTimestamps();
        });

        function fetchTimestamps() {
            allFiles.forEach(item => {
                if (item.timeDisplay !== '--' && item.timeDisplay !== '讀取中...') return; 
                item.timeDisplay = '讀取中...';
                updateTimeCell(item.uid, item.timeDisplay, false);
                
                fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/commits?path=${item.path}&per_page=1`)
                    .then(res => {
                        if (!res.ok) throw new Error('API limit');
                        return res.json();
                    })
                    .then(commits => {
                        if (commits && commits.length > 0) {
                            const date = new Date(commits[0].commit.author.date);
                            item.timeValue = date.getTime(); 
                            item.timeDisplay = `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                            updateTimeCell(item.uid, item.timeDisplay, true);
                        } else {
                            item.timeDisplay = '無紀錄';
                            updateTimeCell(item.uid, item.timeDisplay, false);
                        }
                        if (currentSort.column === 'time') renderFileList();
                    })
                    .catch(() => {
                        item.timeDisplay = '次數達標';
                        const el = document.getElementById(`time-${item.uid}`);
                        if(el) { el.textContent = item.timeDisplay; el.style.color = 'var(--error-color)'; }
                    });
            });
        }

        function updateTimeCell(uid, text, isActive) {
            const el = document.getElementById(`time-${uid}`);
            if (el) {
                el.textContent = text;
                if (isActive) el.classList.add('time-active');
            }
        }
    </script>
</body>
</html>

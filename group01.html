<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大安區公廁查詢與評分系統</title>

    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- 引入 MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <!-- 引入 Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />


    <style>
        /* 基礎重置與排版 */
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 地圖區域 (左側滿版) */
        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        /* 側邊欄區域 (右側固定寬度) */
        #sidebar {
            width: 380px;
            background: #ffffff;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        /* 側邊欄標題 */
        .sidebar-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.4rem;
        }

        /* 側邊欄內容區 */
        .sidebar-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        /* 初始提示狀態 */
        #empty-state {
            text-align: center;
            color: #7f8c8d;
            margin-top: 50px;
            font-size: 1.1rem;
        }

        /* 資訊卡片 */
        #info-panel {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .info-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c3e50;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
        }

        .badge.warning {
            background-color: #e67e22;
        }

        .badge.danger {
            background-color: #e74c3c;
        }

        /* 星級評分區域 */
        .rating-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .rating-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #34495e;
        }

        /* 純 CSS 星星點選實作 */
        .star-rating {
            display: inline-flex;
            flex-direction: row-reverse;
            justify-content: center;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
        }

        /* 當 radio 被選中時，自身與其後的(視覺上在左側) label 變色 */
        .star-rating input:checked~label,
        .star-rating label:hover,
        .star-rating label:hover~label {
            color: #f1c40f;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        .submit-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        /* 搜尋框區塊樣式 */
        .search-container {
            padding: 15px 20px 0 20px;
            background: #ffffff;
            /* 讓搜尋框和下方內容有一點區隔 */
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        #search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            /* 確保 padding 不會撐破容器 */
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #search-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        /* 地圖標記 Hover 提示框樣式 */
        .leaflet-tooltip.custom-map-tooltip {
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .tooltip-title {
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .tooltip-subtitle {
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        /* 定位按鈕樣式 */
        #locate-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1000;
            /* 必須高於地圖預設的 400 z-index */
            background-color: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            transition: background-color 0.2s, transform 0.1s;
        }

        #locate-btn:hover {
            background-color: #f8f9fa;
        }

        #locate-btn:active {
            transform: scale(0.95);
        }

        /* 1. 更改背景顏色 */
        body,
        html {
            background-color: #e9ecef;
            /* 將網頁底色改為稍微柔和的淺灰藍色 */
        }

        #sidebar {
            background-color: #fdfdfd;
            /* 側邊欄改為極淺的暖灰色 */
        }

        .sidebar-header {
            background: #009688;
            /* 將標題區塊背景改為質感的「湖水綠」 */
        }

        /* 2. 導航按鈕樣式 */
        .nav-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #3498db;
            /* 導航按鈕使用藍色 */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .nav-btn:hover {
            background-color: #2980b9;
        }

        .nav-btn:active {
            transform: scale(0.98);
        }

        /* 新增的搜尋與篩選區塊樣式 */
        .search-bar-wrapper {
            display: flex;
            gap: 8px;
        }

        .search-bar-wrapper input {
            flex: 1;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background-color: #219a52;
        }

        .btn-primary:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .filter-section {
            margin-top: 15px;
        }

        .filter-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 0.95rem;
        }

        .filter-label {
            margin-right: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #34495e;
        }

        .filter-label input[type="checkbox"] {
            vertical-align: middle;
            margin-top: -2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- 左側地圖 -->
        <div id="map"></div>
        <!-- 將此段加在 <div id="map"></div> 的正下方 -->
        <button id="locate-btn" onclick="locateUser()" title="定位我的位置">
            📍 定位我的位置
        </button>
        <!-- 右側資訊面板 -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>大安區公廁資訊站</h2>
            </div>

            <!-- 替換原本的 search-container 區塊 -->
            <div class="search-container">
                <!-- 搜尋框與外部查詢按鈕 -->
                <div class="search-bar-wrapper">
                    <input type="text" id="search-input" placeholder="搜尋公廁名稱、地址或外部地標..." oninput="applyFilters()"
                        onkeypress="handleEnter(event)">
                    <button type="button" class="btn-primary" onclick="searchExternalLocation()" title="移動地圖至該地點">🗺️
                        找地點</button>
                </div>

                <!-- 進階篩選區塊 -->
                <div class="filter-section">
                    <div class="filter-title">進階篩選</div>
                    <label class="filter-label">
                        <input type="checkbox" id="filter-diaper" onchange="applyFilters()"> 👶 附尿布檯(未顯示也可能有尿布檯)
                    </label>
                    <div style="margin-top: 8px;">
                        <span style="color: #7f8c8d; margin-right: 5px; font-size: 0.9rem;">評鑑等級：</span>
                        <label class="filter-label"><input type="checkbox" class="filter-grade" value="特優"
                                onchange="applyFilters()"> 特優</label>
                        <label class="filter-label"><input type="checkbox" class="filter-grade" value="優等"
                                onchange="applyFilters()"> 優等</label>
                        <label class="filter-label"><input type="checkbox" class="filter-grade" value="不合格"
                                onchange="applyFilters()"> 不合格</label>
                    </div>
                </div>
            </div>

            <div class="sidebar-content">
                <!-- 預設提示 -->
                <div id="empty-state">
                    👈 請在地圖上點選公廁圖標<br>以檢視詳細資訊與評分
                </div>

                <!-- 資訊顯示區塊 -->
                <div id="info-panel">
                    <div class="info-item">
                        <div class="info-label">建檔名稱</div>
                        <div class="info-value" id="t-name">載入中...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">地址</div>
                        <div class="info-value" id="t-address">載入中...</div>
                    </div>
                    <div class="info-item" style="display: flex; gap: 15px;">
                        <div>
                            <div class="info-label">評鑑等級</div>
                            <div class="info-value"><span id="t-grade" class="badge">特優級</span></div>
                        </div>
                        <div>
                            <div class="info-label">尿布檯</div>
                            <div class="info-value" id="t-diaper">無</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">公廁類型</div>
                        <div class="info-value" id="t-type">載入中...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">管理單位</div>
                        <div class="info-value" id="t-exec" style="font-size: 0.95rem;">載入中...</div>
                    </div>
                    <!-- 新增的導航路線按鈕 -->
                    <button type="button" class="nav-btn" id="nav-btn" onclick="startNavigation()">🗺️ 規劃導航路線</button>
                    <!-- 評分功能區塊 -->
                    <div class="rating-section">
                        <div class="rating-title">您對這個公廁的評價如何？</div>
                        <form id="rating-form">
                            <div class="star-rating">
                                <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                                <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                                <input type="radio" id="star3" name="rating" value="3" /><label for="star3">★</label>
                                <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                                <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
                            </div>
                            <button type="button" class="submit-btn" id="submit-rating-btn"
                                onclick="submitRating()">送出評分</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 引入 MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- 引入 Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        // 1. 初始化地圖 (設定中心點為大安區)
        const map = L.map('map').setView([25.0330, 121.5430], 14);

        // 改用 CARTO 的開源底圖 (對本地 file:/// 協議較友善)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // 初始化 MarkerClusterGroup 點聚合圖層
        const markersCluster = L.markerClusterGroup({
            chunkedLoading: true,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            // 加入自訂圖示渲染邏輯
            iconCreateFunction: function (cluster) {
                const count = cluster.getChildCount();

                // 1. 動態計算大小：基礎 40px，數量越多越大，上限設定為 90px
                // 您可以依照喜好調整公式（例如 count * 1.5 或改變上限）
                const size = Math.min(90, 40 + (count * 1.2));

                // 2. 根據數量設定顏色區間（外圈半透明，內圈深色）
                let bgColor, innerColor;
                if (count < 10) {
                    bgColor = 'rgba(181, 226, 140, 0.6)';     // 淺綠
                    innerColor = 'rgba(110, 204, 57, 0.9)';   // 深綠
                } else if (count < 40) {
                    bgColor = 'rgba(241, 211, 87, 0.6)';      // 淺黃
                    innerColor = 'rgba(240, 194, 12, 0.9)';   // 深黃
                } else {
                    bgColor = 'rgba(253, 156, 115, 0.6)';     // 淺橘
                    innerColor = 'rgba(241, 128, 23, 0.9)';   // 深橘
                }

                // 3. 回傳自訂的 DivIcon，利用 Flexbox 置中並套用算好的尺寸與顏色
                return new L.DivIcon({
                    html: `
                       <div style="
                         background-color: ${bgColor}; 
                            width: 100%; 
                            height: 100%; 
                            border-radius: 50%; 
                            display: flex; 
                         align-items: center; 
                         justify-content: center;
                            transition: all 0.3s ease;
                       ">
                          <div style="
                              background-color: ${innerColor}; 
                              width: 75%; 
                              height: 75%; 
                              border-radius: 50%; 
                              display: flex; 
                              align-items: center; 
                             justify-content: center; 
                              font-size: ${size > 55 ? '16px' : '14px'}; 
                               color: #333; 
                               font-weight: bold;
                          ">
                               ${count}
                           </div>
                     </div>
                   `,
                    className: '', // 清空預設的 class，避免與內建樣式衝突
                    iconSize: L.point(size, size) // 關鍵：動態賦予 Leaflet 渲染大小
                });
            }
        });

        // 記錄目前選取的公廁資訊
        let currentSelectedToilet = null;

        // 2. 核心介面：載入 JSON 陣列資料並生成標記
        function loadToiletData(dataArray) {
            markersCluster.clearLayers();

            dataArray.forEach(data => {
                const lat = parseFloat(data.latitude);
                const lng = parseFloat(data.longitude);

                if (isNaN(lat) || isNaN(lng)) return;

                // 建立 Marker
                const marker = L.marker([lat, lng]);

                // ===== 新增：綁定滑鼠 Hover 顯示的部分資訊 (Tooltip) =====
                const tooltipHtml = `
                  <div class="tooltip-title">${data.name || '未知名稱'}</div>
                   <div class="tooltip-subtitle">${data.type2 || ''} - ${data.type || ''}</div>
                `;
                // 使用 bindTooltip，Leaflet 會自動處理滑鼠移入移出的顯示與隱藏
                marker.bindTooltip(tooltipHtml, {
                    direction: 'top',        // 顯示在標記的上方
                    offset: [0, -10],        // 稍微往上偏移，避免擋住大頭針
                    className: 'custom-map-tooltip', // 套用我們剛剛寫的 CSS class
                    opacity: 1               // 不透明
                });
                // ==========================================================

                // 綁定點擊事件，更新右側欄位
                marker.on('click', () => {
                    showSidebarDetails(data);
                });

                markersCluster.addLayer(marker);
            });

            // 將聚合圖層加入地圖
            map.addLayer(markersCluster);
        }

        // 3. 側邊欄資料連動邏輯
        function showSidebarDetails(data) {
            currentSelectedToilet = data;

            // 隱藏預設提示，顯示資料面板
            document.getElementById('empty-state').style.display = 'none';
            const panel = document.getElementById('info-panel');
            panel.style.display = 'block';

            // 填入詳細資訊
            document.getElementById('t-name').textContent = data.name || '未知名稱';
            document.getElementById('t-address').textContent = data.address || '無地址資訊';

            // 處理等級標籤顏色
            const gradeEl = document.getElementById('t-grade');
            const gradeText = data.grade || '未評鑑';
            gradeEl.textContent = gradeText;
            gradeEl.className = 'badge';
            if (gradeText.includes('不合格')) {
                gradeEl.classList.add('danger');
            } else if (!gradeText.includes('特優') && !gradeText.includes('優')) {
                gradeEl.classList.add('warning');
            }

            document.getElementById('t-diaper').textContent = data.diaper === '1' ? '有提供 ✅' : '無提供 ❌';
            document.getElementById('t-type').textContent = `${data.type2} - ${data.type}`;
            document.getElementById('t-exec').textContent = data.exec || data.administration || '未知';

            // 重置星級評分
            const radioBtns = document.querySelectorAll('input[name="rating"]');
            radioBtns.forEach(btn => btn.checked = false);
        }

        // 4. 送出評分邏輯
        function submitRating() {
            if (!currentSelectedToilet) return;

            const selectedRating = document.querySelector('input[name="rating"]:checked');

            if (!selectedRating) {
                alert('請先點選星星進行評分！');
                return;
            }

            const stars = selectedRating.value;
            const toiletName = currentSelectedToilet.name;

            // 實際應用中這裡會透過 Fetch/XHR 將資料送到後端 API
            alert(`✅ 感謝您的回饋！\n\n您已為「${toiletName}」送出 ${stars} 顆星的評價。`);

            // 評分後可視需求重置表單
            const radioBtns = document.querySelectorAll('input[name="rating"]');
            radioBtns.forEach(btn => btn.checked = false);
        }

        // 5. 資料處理：XML 解析與初始載入
        // 這裡置入您提供的真實 XML 字串片段
        const rawXmlData = `<download_content>
<item-0>
<county>63000</county>
<areacode>6300300</areacode>
<village>敦煌里</village>
<number>A030002043</number>
<name>財團法人國泰綜合醫院本館西1樓無障礙</name>

<administration>縣市政府</administration>
<latitude>25.03691331</latitude>
<longitude>121.55373719</longitude>
<grade>不合格</grade>
<type2>社福機構、集會場所</type2>
<type>無障礙廁所</type>
<exec>財團法人國泰綜合醫院</exec>
<diaper>0</diaper>
</item-0>
<item-1>
<county>63000</county>
<areacode>6300300</areacode>
<village>敦煌里</village>

<name>財團法人國泰綜合醫院本館東1樓無障礙</name>
<address>臺北市大安區敦煌里仁愛路四段280號</address>
<administration>縣市政府</administration>
<latitude>25.03691331</latitude>

<type>無障礙廁所</type>
<exec>財團法人國泰綜合醫院</exec>
<diaper>0</diaper>
</item-1>
<item-2>

        // 解析 XML 成 JSON 陣列[cite: 1]
        function parseXMLToDataArray(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const root = xmlDoc.documentElement;
            const dataArray = [];

            // 遍歷所有 <item-x> 節點
            Array.from(root.children).forEach(node => {
                const itemData = {};
                Array.from(node.children).forEach(prop => {
                    itemData[prop.tagName] = prop.textContent;
                });
                dataArray.push(itemData);
            });

            return dataArray;
        }

        // 將原本的 DOMContentLoaded 替換成這段
        document.addEventListener('DOMContentLoaded', () => {
            // 解析 XML 並存入全域變數，供搜尋功能使用
            allToiletData = parseXMLToDataArray(rawXmlData);
            // 初始載入全部資料
            loadToiletData(allToiletData);
        });;

        // 宣告全域變數來儲存「所有」未被過濾的原始資料
        let allToiletData = [];

        // 1. 綜合篩選邏輯 (文字關鍵字 + 尿布檯 + 評鑑等級)
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            const requireDiaper = document.getElementById('filter-diaper').checked;

            // 取得有被勾選的評鑑等級 (如果都沒勾選，視為不限制)
            const gradeCheckboxes = document.querySelectorAll('.filter-grade:checked');
            const selectedGrades = Array.from(gradeCheckboxes).map(cb => cb.value);

            // 從 allToiletData 中過濾出符合條件的資料
            const filteredData = allToiletData.filter(data => {
                // 條件 A: 關鍵字比對
                const name = (data.name || '').toLowerCase();
                const address = (data.address || '').toLowerCase();
                const type = (data.type || '').toLowerCase();
                const matchText = name.includes(searchTerm) || address.includes(searchTerm) || type.includes(searchTerm);

                // 條件 B: 尿布檯比對 ('1' 代表有尿布檯)
                const matchDiaper = requireDiaper ? (data.diaper === '1') : true;

                // 條件 C: 評鑑等級比對
                const gradeText = data.grade || '';
                const matchGrade = selectedGrades.length > 0 ? selectedGrades.some(grade => gradeText.includes(grade)) : true;

                return matchText && matchDiaper && matchGrade;
            });

            // 將過濾後的資料重新渲染到地圖上
            loadToiletData(filteredData);

            // 重置右側面板狀態
            document.getElementById('info-panel').style.display = 'none';
            const emptyState = document.getElementById('empty-state');
            emptyState.style.display = 'block';
            emptyState.innerHTML = filteredData.length === 0 ? '找不到符合條件的公廁 😢<br>請嘗試放寬篩選條件' : '👈 請在地圖上點選公廁圖標<br>以檢視詳細資訊與評分';
        }

        // 2. 外部地點查詢邏輯 (透過 OSM Nominatim API 取得經緯度)
        function searchExternalLocation() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ 搜尋中...';
            btn.disabled = true;

            // 呼叫免費的地理編碼 API (限定台灣範圍)
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=tw&limit=1`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;

                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);
                        const placeName = data[0].display_name.split(',')[0]; // 取地名第一段

                        // 1. 移動地圖到搜尋到的地點
                        map.setView([lat, lon], 16);

                        // 2. 在該地點放置「紅色定位點」
                        if (userLocationMarker) map.removeLayer(userLocationMarker);

                        userLocationMarker = L.circleMarker([lat, lon], {
                            radius: 8,
                            fillColor: "#e74c3c",
                            color: "#fff",
                            weight: 3,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map);

                        userLocationMarker.bindTooltip(`📍 查詢地點: ${placeName}`, {
                            direction: 'top', offset: [0, -8]
                        }).openTooltip();

                        // 🌟 3. 關鍵修正：清空搜尋框，避免「地標名稱」過濾掉附近的真實公廁
                        document.getElementById('search-input').value = '';

                        // 4. 重新執行篩選 (此時因為搜尋框是空的，該區域符合勾選條件的公廁就會全部顯示)
                        applyFilters();

                    } else {
                        alert("找不到該地點！\n建議加上更詳細的區域，例如：「大安區 忠孝東路」或「台北101」。");
                    }
                })
                .catch(error => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    console.error("地點搜尋錯誤:", error);
                    alert("地點搜尋發生錯誤，請檢查網路連線。");
                });
        }

        // 3. 監聽搜尋框的 Enter 鍵
        function handleEnter(event) {
            if (event.key === 'Enter') {
                searchExternalLocation();
            }
        }

        // 全域變數，用來記錄使用者的當前位置標記，避免重複標記
        let userLocationMarker = null;

        // 定位函式
        function locateUser() {
            const btn = document.getElementById('locate-btn');
            const originalText = btn.innerHTML;

            // 點擊後先改變按鈕文字，讓使用者知道正在處理
            btn.innerHTML = '⏳ 定位中...';

            // 呼叫 Leaflet 內建的定位功能，並設定最高縮放層級為 16
            map.locate({ setView: true, maxZoom: 16 });

            // 監聽定位成功的事件 (使用 once 確保每次點擊只觸發一次)
            map.once('locationfound', function (e) {
                btn.innerHTML = originalText; // 恢復按鈕文字

                // 如果之前有定位過，先移除舊的標記
                if (userLocationMarker) {
                    map.removeLayer(userLocationMarker);
                }

                // 畫一個醒目的「紅色圓圈」代表使用者位置
                userLocationMarker = L.circleMarker(e.latlng, {
                    radius: 8,
                    fillColor: "#e74c3c",  // 紅色填滿
                    color: "#fff",         // 白色邊框
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                // 綁定提示框
                userLocationMarker.bindTooltip("📍 您目前的位置", {
                    direction: 'top',
                    offset: [0, -8]
                }).openTooltip();
            });

            // 監聽定位失敗的事件
            map.once('locationerror', function (e) {
                btn.innerHTML = originalText; // 恢復按鈕文字
                // 可能是使用者拒絕授權，或設備沒有 GPS
                alert("無法取得您的位置，請確認是否已允許瀏覽器存取位置資訊。\n(錯誤訊息: " + e.message + ")");
            });
        }

        // 全域變數，用來儲存導航路線的控制元件
        let routingControl = null;

        // 導航路線計算函式 (加入防卡死與備用伺服器)
        function startNavigation() {
            // 確保有選中公廁
            if (!currentSelectedToilet) return;

            // 確保使用者已經定位或手動點擊起點
            if (!userLocationMarker) {
                alert("請先點擊左下角定位，或直接在地圖上點擊任一處作為起點！");
                return;
            }

            const destLat = parseFloat(currentSelectedToilet.latitude);
            const destLng = parseFloat(currentSelectedToilet.longitude);
            const userLatLng = userLocationMarker.getLatLng();

            // 點擊後先改變按鈕文字並鎖定
            const navBtn = document.getElementById('nav-btn');
            const originalBtnText = navBtn.innerHTML;
            navBtn.innerHTML = '⏳ 路線計算中...';
            navBtn.disabled = true;

            // 如果地圖上已經有舊的導航路線，先把它清除
            if (routingControl) {
                map.removeControl(routingControl);
            }

            // 🌟 【防卡死機制】設定 10 秒計時器，如果伺服器沒反應就自動解鎖按鈕
            const timeoutId = setTimeout(() => {
                navBtn.innerHTML = originalBtnText;
                navBtn.disabled = false;
                if (routingControl) {
                    map.removeControl(routingControl);
                    routingControl = null;
                }
                alert("⚠️ 伺服器回應逾時！\n免費導航伺服器目前忙碌中，或是您的連線被阻擋。\n\n💡 建議：請確認您是用 VS Code 的 Live Server 開啟網頁，而不是直接雙擊檔案。");
            }, 10000); // 10000 毫秒 = 10 秒

            try {
                // 建立新的真實街道導航路線
                routingControl = L.Routing.control({
                    waypoints: [
                        userLatLng,                     // 起點
                        L.latLng(destLat, destLng)      // 終點
                    ],
                    // 🌟 更換為另一個更穩定、對測試友善的德國 OSRM 開源節點
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://routing.openstreetmap.de/routed-car/route/v1'
                    }),
                    lineOptions: {
                        styles: [{ color: '#3498db', opacity: 0.8, weight: 6 }]
                    },
                    show: false,                // 隱藏預設面板
                    addWaypoints: false,        // 禁止拖曳產生新節點
                    routeWhileDragging: false,
                    fitSelectedRoutes: true,    // 自動縮放
                    createMarker: function () { return null; } // 隱藏預設起終點大頭針

                }).on('routesfound', function (e) {
                    // 成功找到路線：清除計時器，恢復按鈕
                    clearTimeout(timeoutId);
                    navBtn.innerHTML = originalBtnText;
                    navBtn.disabled = false;

                }).on('routingerror', function (e) {
                    // 發生錯誤：清除計時器，恢復按鈕並跳出提示
                    clearTimeout(timeoutId);
                    navBtn.innerHTML = originalBtnText;
                    navBtn.disabled = false;
                    alert("⚠️ 導航路線規劃失敗！伺服器拒絕了請求。");
                    console.error("導航錯誤詳細資訊:", e);

                }).addTo(map);

            } catch (error) {
                // 捕捉程式碼層面的意外錯誤
                clearTimeout(timeoutId);
                navBtn.innerHTML = originalBtnText;
                navBtn.disabled = false;

                // 🚨 新增這行：用警告視窗印出真實的錯誤訊息！
                alert("程式發生異常錯誤！\n錯誤細節：" + error.message);
                console.error("發生未預期錯誤:", error);
            }
        }

        // ===== 新增：手動點擊地圖設定起點功能 =====
        map.on('click', function (e) {
            // 1. 先移除舊的定位標記（不管是 GPS 定位的還是之前手動點擊的）
            if (userLocationMarker) {
                map.removeLayer(userLocationMarker);
            }

            // 2. 在滑鼠點擊的座標 (e.latlng) 畫上紅色的定位點
            userLocationMarker = L.circleMarker(e.latlng, {
                radius: 8,
                fillColor: "#e74c3c",  // 紅色
                color: "#fff",         // 白色邊框
                weight: 3,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            // 3. 綁定提示文字
            userLocationMarker.bindTooltip("📍 手動設定的起點", {
                direction: 'top',
                offset: [0, -8]
            }).openTooltip();

            // 貼心提醒：在地圖上放好起點後，如果有已經開啟的導航，會提示使用者重新點擊規劃
            if (routingControl) {
                console.log("起點已更新，請再次點擊「規劃導航路線」來更新藍線。");
            }
        });
        // =====================================

    </script>
